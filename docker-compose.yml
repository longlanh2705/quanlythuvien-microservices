version: '3.8'

services:
  # Databases
  postgres:
    image: postgres:15-alpine
    container_name: library_postgres
    restart: always
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - library-net

  mongodb:
    image: mongo:6.0
    container_name: library_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: catalog_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - library-net

  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: library_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - library-net

  # LƯU Ý: Catalog Service và Auth Service được chạy local bằng npm run dev
  # (qua start-all.bat) thay vì Docker, để tiện phát triển và hot-reload.

volumes:
  postgres_data:
  mongodb_data:
  rabbitmq_data:

networks:
  library-net:
    driver: bridge
